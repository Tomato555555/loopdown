<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  .wrap { padding: 1.5rem 1rem; max-width: 480px; margin: 0 auto; }
  .section-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 6px; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1.25rem; }
  .input-group { display: flex; flex-direction: column; }
  .input-group input { text-align: center; font-size: 15px; }
  .display-area { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 2rem 1rem; text-align: center; margin-bottom: 1.25rem; border: 0.5px solid var(--color-border-tertiary); }
  .phase-label { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 8px; letter-spacing: 0.05em; }
  .big-number { font-size: 72px; font-weight: 500; color: var(--color-text-primary); line-height: 1; margin-bottom: 12px; font-variant-numeric: tabular-nums; }
  .big-number.break-color { color: #1D9E75; }
  .big-number.done-color { color: #639922; }
  .status-row { display: flex; justify-content: center; gap: 24px; font-size: 13px; color: var(--color-text-secondary); }
  .status-val { font-weight: 500; color: var(--color-text-primary); }
  .progress-bar-wrap { height: 6px; background: var(--color-background-primary); border-radius: 99px; margin: 1rem 0 1.5rem; overflow: hidden; border: 0.5px solid var(--color-border-tertiary); }
  .progress-bar { height: 100%; border-radius: 99px; background: #378ADD; transition: width 0.25s linear; }
  .progress-bar.break-bar { background: #1D9E75; }
  .btn-row { display: flex; gap: 10px; }
  .btn-row button { flex: 1; padding: 10px; font-size: 14px; border-radius: var(--border-radius-md); cursor: pointer; border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); transition: background 0.15s; }
  .btn-row button:hover { background: var(--color-background-secondary); }
  .btn-start { border-color: #378ADD !important; color: #185FA5 !important; font-weight: 500; }
  .btn-reset { color: var(--color-text-secondary) !important; }
  .rounds-dots { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin: 0.75rem 0; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--color-border-secondary); border: 0.5px solid var(--color-border-secondary); }
  .dot.done-dot { background: #378ADD; border-color: #185FA5; }
  .dot.active-dot { background: #E24B4A; border-color: #A32D2D; }
  .dot.break-dot { background: #1D9E75; border-color: #0F6E56; }
</style>

<div class="wrap">
  <h2 class="sr-only">ตัวนับถอยหลังพร้อมรอบซ้ำและระยะพัก</h2>

  <div class="input-row">
    <div class="input-group">
      <span class="section-label">⏱ เวลานับถอยหลัง (วิ)</span>
      <input type="number" id="inp-duration" value="25" min="1" max="3600">
    </div>
    <div class="input-group">
      <span class="section-label">🔁 จำนวนรอบ</span>
      <input type="number" id="inp-rounds" value="4" min="1" max="99">
    </div>
    <div class="input-group">
      <span class="section-label">☕ ระยะพัก (วิ)</span>
      <input type="number" id="inp-break" value="5" min="0" max="3600">
    </div>
  </div>

  <div class="rounds-dots" id="dots-container"></div>

  <div class="display-area">
    <div class="phase-label" id="phase-label">รอเริ่ม</div>
    <div class="big-number" id="big-num">—</div>
    <div class="status-row">
      <span>รอบที่ <span class="status-val" id="cur-round">-</span> / <span id="total-rounds">-</span></span>
      <span>เฟส <span class="status-val" id="cur-phase">-</span></span>
    </div>
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="btn-row">
    <button class="btn-start" id="btn-main" onclick="handleMain()"><i class="ti ti-player-play" aria-hidden="true"></i> เริ่ม</button>
    <button class="btn-reset" onclick="handleReset()"><i class="ti ti-refresh" aria-hidden="true"></i> รีเซ็ต</button>
  </div>
</div>

<script>
  let timer = null;
  let state = 'idle';
  let currentRound = 0;
  let totalRounds = 0;
  let phase = 'work';
  let remaining = 0;
  let phaseDuration = 0;

  const bigNum = document.getElementById('big-num');
  const phaseLabel = document.getElementById('phase-label');
  const curRound = document.getElementById('cur-round');
  const totalRoundsEl = document.getElementById('total-rounds');
  const curPhase = document.getElementById('cur-phase');
  const progressBar = document.getElementById('progress-bar');
  const btnMain = document.getElementById('btn-main');
  const dotsContainer = document.getElementById('dots-container');

  function fmt(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    if (m > 0) return m + ':' + String(sec).padStart(2,'0');
    return String(sec);
  }

  function buildDots(n) {
    dotsContainer.innerHTML = '';
    for (let i = 1; i <= n; i++) {
      const d = document.createElement('div');
      d.className = 'dot';
      d.id = 'dot-' + i;
      dotsContainer.appendChild(d);
    }
  }

  function updateDots() {
    for (let i = 1; i <= totalRounds; i++) {
      const d = document.getElementById('dot-' + i);
      if (!d) continue;
      d.className = 'dot';
      if (i < currentRound) d.classList.add('done-dot');
      else if (i === currentRound) {
        d.classList.add(phase === 'break' ? 'break-dot' : 'active-dot');
      }
    }
  }

  function updateDisplay() {
    bigNum.textContent = fmt(remaining);
    bigNum.className = 'big-number';
    progressBar.className = 'progress-bar';

    if (phase === 'work') {
      phaseLabel.textContent = '💪 ทำงาน — รอบที่ ' + currentRound;
      curPhase.textContent = 'ทำงาน';
    } else {
      phaseLabel.textContent = '☕ พัก';
      curPhase.textContent = 'พัก';
      bigNum.classList.add('break-color');
      progressBar.classList.add('break-bar');
    }

    curRound.textContent = currentRound;
    totalRoundsEl.textContent = totalRounds;
    const pct = phaseDuration > 0 ? Math.round(((phaseDuration - remaining) / phaseDuration) * 100) : 0;
    progressBar.style.width = pct + '%';
    updateDots();
  }

  function tick() {
    if (remaining > 0) {
      remaining--;
      updateDisplay();
    } else {
      if (phase === 'work') {
        const breakTime = parseInt(document.getElementById('inp-break').value) || 0;
        if (currentRound < totalRounds && breakTime > 0) {
          phase = 'break';
          phaseDuration = breakTime;
          remaining = breakTime;
          updateDisplay();
        } else {
          nextRound();
        }
      } else {
        nextRound();
      }
    }
  }

  function nextRound() {
    currentRound++;
    if (currentRound > totalRounds) {
      clearInterval(timer);
      timer = null;
      state = 'done';
      bigNum.textContent = '✓';
      bigNum.className = 'big-number done-color';
      phaseLabel.textContent = '🎉 เสร็จแล้ว!';
      curPhase.textContent = 'สำเร็จ';
      progressBar.style.width = '100%';
      progressBar.className = 'progress-bar';
      btnMain.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> เริ่มใหม่';
      for (let i = 1; i <= totalRounds; i++) {
        const d = document.getElementById('dot-' + i);
        if (d) { d.className = 'dot done-dot'; }
      }
      return;
    }
    phase = 'work';
    const dur = parseInt(document.getElementById('inp-duration').value) || 25;
    phaseDuration = dur;
    remaining = dur;
    updateDisplay();
  }

  function handleMain() {
    if (state === 'idle' || state === 'done') {
      totalRounds = parseInt(document.getElementById('inp-rounds').value) || 4;
      const dur = parseInt(document.getElementById('inp-duration').value) || 25;
      currentRound = 1;
      phase = 'work';
      phaseDuration = dur;
      remaining = dur;
      state = 'running';
      buildDots(totalRounds);
      updateDisplay();
      btnMain.innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> หยุดชั่วคราว';
      timer = setInterval(tick, 1000);
    } else if (state === 'running') {
      clearInterval(timer);
      timer = null;
      state = 'paused';
      btnMain.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> ต่อ';
    } else if (state === 'paused') {
      state = 'running';
      btnMain.innerHTML = '<i class="ti ti-player-pause" aria-hidden="true"></i> หยุดชั่วคราว';
      timer = setInterval(tick, 1000);
    }
  }

  function handleReset() {
    clearInterval(timer);
    timer = null;
    state = 'idle';
    currentRound = 0;
    phase = 'work';
    remaining = 0;
    phaseDuration = 0;
    bigNum.textContent = '—';
    bigNum.className = 'big-number';
    phaseLabel.textContent = 'รอเริ่ม';
    curRound.textContent = '-';
    curPhase.textContent = '-';
    totalRoundsEl.textContent = '-';
    progressBar.style.width = '0%';
    progressBar.className = 'progress-bar';
    btnMain.innerHTML = '<i class="ti ti-player-play" aria-hidden="true"></i> เริ่ม';
    dotsContainer.innerHTML = '';
  }
</script>
